<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lantern · research agent</title>
    <meta
      name="description"
      content="Ask a question; a Cloudflare Workflow plans it, searches the web, and writes a cited report."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar" aria-label="History">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
              <path d="M9 3h6l-1 3H10L9 3Z" fill="currentColor" />
              <path
                d="M7 6h10l1.6 9.2A4 4 0 0 1 14.7 20H9.3a4 4 0 0 1-3.9-4.8L7 6Z"
                stroke="currentColor"
                stroke-width="1.4"
              />
              <circle cx="12" cy="14" r="2.4" fill="currentColor" />
            </svg>
          </span>
          <span class="brand-name">Lantern</span>
        </div>

        <button class="new-btn" id="new-btn" type="button">
          <span aria-hidden="true">+</span> New research
        </button>

        <div class="history-label">Recent</div>
        <div class="history" id="history">
          <p class="history-empty">Your past research shows up here.</p>
        </div>

        <div class="sidebar-foot">
          <span class="dot-live" aria-hidden="true"></span>
          <span id="session-label">session —</span>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button class="menu-btn" id="menu-btn" type="button" aria-label="Toggle history">≡</button>
          <span class="topbar-title">Research agent</span>
          <span class="topbar-stack">Llama 3.3 · Workers AI · Workflows · Durable Objects</span>
        </header>

        <div class="scroll">
          <section class="composer">
            <p class="eyebrow">Ask the web</p>
            <h1 class="composer-title">What do you want to understand?</h1>
            <form class="ask" id="ask-form">
              <textarea
                id="q"
                class="ask-input"
                rows="2"
                placeholder="e.g. How do CRISPR base editors differ from prime editors, and where is each used?"
                autocomplete="off"
              ></textarea>
              <button class="ask-btn" id="ask-btn" type="submit">Research</button>
            </form>
            <div class="examples" id="examples"></div>
            <p class="form-error" id="form-error" hidden></p>
          </section>

          <section class="run" id="run" hidden>
            <div class="run-head">
              <h2 class="run-q" id="run-q"></h2>
              <div class="run-phase" id="run-phase" aria-live="polite"></div>
            </div>

            <ol class="trail" id="trail"></ol>

            <article class="report" id="report" hidden></article>

            <section class="sources" id="sources" hidden>
              <h3 class="sources-title">Sources</h3>
              <ol class="sources-list" id="sources-list"></ol>
            </section>
          </section>
        </div>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
